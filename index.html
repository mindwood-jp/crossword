<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>まるちゃんのクロスワードパズル</title>
<meta property="og:title" content="まるちゃんのクロスワードパズル">
<meta property="og:description" content="石丸伸二にまつわるクロスワード。全50問！">
<meta property="og:image" content="https://mindwood-jp.github.io/crossword/ogp.png">
<meta property="og:url" content="https://mindwood-jp.github.io/crossword/">
<meta property="og:type" content="website">

<style>
:root {
  --bg: #f0f0ee;
  --surface: #ffffff;
  --surface2: #f7f7f5;
  --border: #c8c8c0;
  --border-cell: #999990;
  --black-cell: #1a1a1a;
  --accent: #6b3fa0;
  --accent-word: #ede0f7;
  --accent-cursor: #6b3fa0;
  --text: #111111;
  --text2: #666660;
  --correct-bg: #d4edda;
  --correct-fg: #1a6630;
  --wrong-bg: #fde0e0;
  --wrong-fg: #aa2222;
  --cell-size: 36px;
  --cell-font: 15px;
  --num-font: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; }
#app { display: flex; flex-direction: column; min-height: 100vh; }
header { padding: 10px 16px; border-bottom: 1px solid var(--accent); background: var(--accent); text-align: center; }
header h1 { font-size: 16px; font-weight: 700; color: #ffffff; letter-spacing: 0.08em; }
#main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 8px 0; overflow-y: auto; }
#grid-wrap { width: 100%; display: flex; justify-content: center; margin-bottom: 12px; }
#grid { display: inline-grid; border: 2px solid var(--black-cell); gap: 0; }
.cell {
  width: var(--cell-size); height: var(--cell-size);
  position: relative; cursor: pointer;
  border: 0.5px solid var(--border-cell);
  font-weight: 700; letter-spacing: 0;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.cell.black {
  cursor: default;
  border-color: var(--black-cell);
  background: linear-gradient(135deg, #1a1a2e, #2d1a4a, #1a1a2e, #0f0f1a, #2d1a4a);
  background-size: 300% 300%;
  animation: blackCellFlow 6s ease infinite;
}
@keyframes blackCellFlow {
  0%   { background-position: 0% 0%; }
  50%  { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}
.cell.white { background: #ffffff; color: var(--text); }
.cell.white:hover { background: #f5eeff; }
.cell.active-word { background: var(--accent-word); }
.cell.active-cell { background: var(--accent-cursor) !important; color: #ffffff !important; }
.cell.active-cell .cell-num { color: #ddc8f5 !important; }
.cell.correct { background: var(--correct-bg) !important; color: var(--correct-fg) !important; }
.cell.wrong { background: var(--wrong-bg) !important; color: var(--wrong-fg) !important; }
.cell-num {
  position: absolute; top: 1px; left: 2px;
  font-size: var(--num-font); font-weight: 600;
  color: var(--accent); line-height: 1; pointer-events: none;
}
.cell-letter {
  pointer-events: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 2px;
  font-size: var(--cell-font);
  font-weight: 700;
  line-height: 1;
}
.cell-letter.drop-in {
  animation: dropInLetter 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
@keyframes dropInLetter {
  from { opacity: 0; transform: translateY(-60%); }
  to   { opacity: 1; transform: translateY(0); }
}
#clue-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.35);
  align-items: flex-end; justify-content: center;
  padding: 16px;
}
#clue-overlay.show { display: flex; }
#clue-overlay.pos-top { align-items: flex-start; }
#clue-overlay.pos-bottom { align-items: flex-end; }
#clue-panel {
  width: 100%; max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 16px 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.clue-num { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.clue-num .num-badge {
  display: inline-block; background: var(--accent);
  color: #fff; font-size: 12px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px; letter-spacing: 0.05em;
}
.clue-num .dir-label { font-size: 12px; color: var(--text2); font-weight: 600; }
.clue-text { font-size: 15px; line-height: 1.6; color: var(--text); margin-bottom: 10px; }
.clue-placeholder { font-size: 14px; color: var(--text2); line-height: 1.6; }
.input-row { display: flex; flex-direction: column; gap: 8px; }
.input-row .action-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.input-row .btn-group { display: flex; gap: 8px; }
.input-error { font-size: 12px; color: #cc3333; flex: 1; }
.answer-input {
  width: 100%;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 6px; padding: 8px 12px;
  font-size: 16px; color: var(--text);
  outline: none; letter-spacing: 0.12em;
  font-family: inherit; font-weight: 700;
}
.answer-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(107,63,160,0.15); }
.btn {
  padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  font-size: 13px; cursor: pointer; font-family: inherit;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn.primary { background: var(--accent); color: #ffffff; border-color: var(--accent); font-weight: 700; }
.btn.primary:hover { background: #532e80; }
#complete-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 100;
  align-items: center; justify-content: center;
}
#complete-overlay.show { display: flex; }
.complete-box {
  background: #fff; border: 2px solid var(--accent);
  border-radius: 16px; padding: 40px 48px; text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.complete-box h2 { font-size: 28px; color: var(--accent); margin-bottom: 8px; letter-spacing: 0.1em; }
.complete-box p { color: var(--text2); font-size: 14px; margin-bottom: 20px; }
canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 99; }
#how-to-play {
  width: 100%; max-width: 760px;
  padding: 14px 16px 20px;
  margin-top: 4px;
}
#how-to-play p {
  font-size: 13px; color: var(--text2); line-height: 1.7;
  margin-bottom: 6px;
  padding-left: 1.2em;
  position: relative;
}
#how-to-play p::before {
  content: '•';
  position: absolute; left: 0; top: -2px;
  color: var(--accent);
  font-size: 24px;
  line-height: 1;
}
  .clue-text { font-size: 14px; }
}

.cell.double-border {
  position: relative;
}
.cell.double-border::after {
  content: '';
  position: absolute;
  inset: 2px;
  border: 2px solid var(--accent);
  pointer-events: none;
  z-index: 1;
}

.cell.hint-cell {
  background: #f5eeff !important;
}
.cell.hint-cell .cell-letter {
  color: var(--accent);
}

@media (max-width: 480px) {
  .cell.double-border::after {
    inset: 1px;
    border: 1px solid var(--accent);
  }
  .cell-letter {
    padding-bottom: 0px;
  }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1 id="title" onclick="onTitleClick()">まるちゃんのクロスワードパズル</h1>
  </header>
  <div id="main">
    <div id="grid-wrap"><div id="grid"></div></div>
    <div id="how-to-play">
      <p>マス目をタップすると、そのマスに関連するカギが表示されます。答えをカタカナまたはひらがなで入力し、確定ボタンまたはEnterキーを押してください。</p>
      <p>同じマスを2回タップすると、ヨコとタテを切り替えられます。</p>
      <p>すべてのマスを正しく埋めるとクリアです！</p>
      <p>二重枠のマスに入った文字を組み合わせると、ある固有名詞が浮かび上がります。</p>
    </div>
    <div id="clue-overlay" onclick="onOverlayClick(event)">
      <div id="clue-panel"></div>
    </div>
  </div>
</div>
<div id="complete-overlay">
  <canvas id="confetti"></canvas>
  <div class="complete-box">
    <h2>🎉 完成！</h2>
    <p>あなたは石丸ウォッチャーです</p>
    <button class="btn primary" onclick="document.getElementById('complete-overlay').classList.remove('show')">閉じる</button>
  </div>
</div>

const grid = PUZZLE.grid;
const H = PUZZLE.height, W = PUZZLE.width;
const across = PUZZLE.across, down = PUZZLE.down;

const userGrid = Array.from({length: H}, () => Array(W).fill(''));
const checkedGrid = Array.from({length: H}, () => Array(W).fill(null));

let selectedR = -1, selectedC = -1, selectedDir = 'across';

function calcCellSize() {
  const padding = 16; // #mainの左右padding合計
  const maxSize = 36;
  const size = Math.floor((window.innerWidth - padding) / W);
  const cellSize = Math.min(size, maxSize);
  const fontSize = Math.max(11, Math.floor(cellSize * 0.58));
  const numSize = Math.max(6, Math.floor(cellSize * 0.22));
  document.documentElement.style.setProperty('--cell-size', cellSize + 'px');
  document.documentElement.style.setProperty('--cell-font', fontSize + 'px');
  document.documentElement.style.setProperty('--num-font', numSize + 'px');
}

const HINT_CELLS = new Set([[3, 18], [8, 4], [10, 10], [19, 8]].map(([r,c])=>r+','+c));
const HINT_MAP = {}; HINT_MAP["3,18"] = "ウ"; HINT_MAP["8,4"] = "コ"; HINT_MAP["10,10"] = "ヒ"; HINT_MAP["19,8"] = "イ";

const SPECIAL_CELLS = new Set([[11, 9], [15, 12], [4, 16], [17, 15], [8, 14], [9, 1]].map(([r,c])=>r+','+c));

function buildGrid() {
  const el = document.getElementById('grid');
  el.style.gridTemplateColumns = `repeat(${W}, var(--cell-size))`;
  el.innerHTML = '';
  for (let r = 0; r < H; r++) {
    for (let c = 0; c < W; c++) {
      const cell = document.createElement('div');
      const isSpecial = SPECIAL_CELLS.has(r+','+c);
      const isHint = HINT_CELLS.has(r+','+c);
      cell.className = grid[r][c].black ? 'cell black' : ('cell white' + (isSpecial ? ' double-border' : '') + (isHint ? ' hint-cell' : ''));
      if (grid[r][c].number) {
        const num = document.createElement('span');
        num.className = 'cell-num';
        num.textContent = grid[r][c].number;
        cell.appendChild(num);
      }
      const letter = document.createElement('span');
      letter.className = 'cell-letter';
      letter.id = `cell-${r}-${c}`;
      cell.appendChild(letter);
      cell.addEventListener('click', (e) => onCellClick(r, c, e));
      el.appendChild(cell);
    }
  }
}

function getCellEl(r, c) { return document.getElementById(`cell-${r}-${c}`); }
function getCellDiv(r, c) { return document.getElementById('grid').children[r * W + c]; }

function renderGrid() {
  for (let r = 0; r < H; r++) {
    for (let c = 0; c < W; c++) {
      if (grid[r][c].black) continue;
      getCellEl(r, c).textContent = userGrid[r][c];
      const div = getCellDiv(r, c);
      div.classList.remove('active-word', 'active-cell', 'correct', 'wrong');
      if (checkedGrid[r][c] === true) div.classList.add('correct');
      else if (checkedGrid[r][c] === false) div.classList.add('wrong');
    }
  }
  highlightWord();
  checkComplete();
}

function highlightWord() {
  if (selectedR < 0) return;
  const word = getWordAt(selectedR, selectedC, selectedDir);
  if (!word) return;
  for (let i = 0; i < word.len; i++) {
    const r = selectedDir === 'down' ? word.row + i : word.row;
    const c = selectedDir === 'across' ? word.col + i : word.col;
    getCellDiv(r, c).classList.add('active-word');
  }
  getCellDiv(selectedR, selectedC).classList.add('active-cell');
}

function getWordAt(r, c, dir) {
  const words = dir === 'across' ? across : down;
  for (const [, w] of Object.entries(words)) {
    if (dir === 'across' && w.row === r && c >= w.col && c < w.col + w.len) return w;
    if (dir === 'down' && w.col === c && r >= w.row && r < w.row + w.len) return w;
  }
  return null;
}

function getWordNumAt(r, c, dir) {
  const words = dir === 'across' ? across : down;
  for (const [n, w] of Object.entries(words)) {
    if (dir === 'across' && w.row === r && c >= w.col && c < w.col + w.len) return n;
    if (dir === 'down' && w.col === c && r >= w.row && r < w.row + w.len) return n;
  }
  return null;
}

function onCellClick(r, c, event) {
  if (grid[r][c].black) return;
  const hasAcross = !!getWordAt(r, c, 'across');
  const hasDown = !!getWordAt(r, c, 'down');
  if (selectedR === r && selectedC === c) {
    if (hasAcross && hasDown)
      selectedDir = selectedDir === 'across' ? 'down' : 'across';
  } else {
    selectedR = r; selectedC = c;
    if (hasAcross && !hasDown) selectedDir = 'across';
    else if (!hasAcross && hasDown) selectedDir = 'down';
    else if (!getWordAt(r, c, selectedDir)) selectedDir = hasAcross ? 'across' : 'down';
  }
  // パネルは常に画面上部
  const overlay = document.getElementById('clue-overlay');
  overlay.classList.remove('pos-bottom');
  overlay.classList.add('pos-top');

  showCluePanel();
  renderGrid();
  document.getElementById('answer-input')?.focus();
}

function showCluePanel() {
  if (selectedR < 0) return;
  const word = getWordAt(selectedR, selectedC, selectedDir);
  const num = getWordNumAt(selectedR, selectedC, selectedDir);
  if (!word) return;
  const dirLabel = selectedDir === 'across' ? 'ヨコ' : 'タテ';
  let current = '';
  let allFilled = true;
  for (let i = 0; i < word.len; i++) {
    const r = selectedDir === 'down' ? word.row + i : word.row;
    const c = selectedDir === 'across' ? word.col + i : word.col;
    if (!userGrid[r][c]) { allFilled = false; break; }
  }
  if (allFilled) {
    for (let i = 0; i < word.len; i++) {
      const r = selectedDir === 'down' ? word.row + i : word.row;
      const c = selectedDir === 'across' ? word.col + i : word.col;
      current += userGrid[r][c];
    }
  }
  document.getElementById('clue-overlay').classList.add('show');
  document.getElementById('clue-panel').innerHTML = `
    <div class="clue-num"><span class="num-badge">${num}</span><span class="dir-label">${dirLabel}　${word.len}文字</span></div>
    <div class="clue-text">${word.question}</div>
    <div class="input-row">
      <input class="answer-input" id="answer-input" type="text" maxlength="${word.len * 2}"
        placeholder="${'□'.repeat(word.len)}"
        onkeydown="onAnswerKey(event)">
      <div class="action-row">
        <span class="input-error" id="input-error"></span>
        <div class="btn-group">
          <button class="btn primary" onclick="commitAnswer()">確定</button>
          <button class="btn" onclick="clearAnswer()">クリア</button>
        </div>
      </div>
    </div>`;
  document.getElementById('answer-input').value = current;
}

function onAnswerKey(e) {
  if (e.key === 'Enter') commitAnswer();
}

function normalizeInput(str) {
  return str
    .replace(/[ぁ-ゖ]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60))
    .replace(/ァ/g,'ア').replace(/ィ/g,'イ').replace(/ゥ/g,'ウ')
    .replace(/ェ/g,'エ').replace(/ォ/g,'オ')
    .replace(/ャ/g,'ヤ').replace(/ュ/g,'ユ').replace(/ョ/g,'ヨ')
    .replace(/ッ/g,'ツ');
}

function clearAnswer() {
  if (selectedR < 0) return;
  const word = getWordAt(selectedR, selectedC, selectedDir);
  if (!word) return;
  for (let i = 0; i < word.len; i++) {
    const r = selectedDir === 'down' ? word.row + i : word.row;
    const c = selectedDir === 'across' ? word.col + i : word.col;
    if (!HINT_CELLS.has(r+','+c)) { userGrid[r][c] = ''; checkedGrid[r][c] = null; }
  }
  const inp = document.querySelector('.answer-input');
  if (inp) { inp.value = ''; inp.style.borderColor = ''; }
  renderGrid();
  saveProgress();
  closePanel();
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('clue-overlay')) closePanel();
}

function closePanel() {
  document.getElementById('clue-overlay').classList.remove('show');
}

function commitAnswer() {
  if (selectedR < 0) return;
  const word = getWordAt(selectedR, selectedC, selectedDir);
  const inp = document.getElementById('answer-input');
  if (!word || !inp) return;
  const val = normalizeInput(inp.value.replace(/\s/g, ''));
  if (val.length > 0 && /[^゠-ヿ]/.test(val)) {
    inp.style.borderColor = '#cc3333';
    const err = document.getElementById('input-error');
    if (err) err.textContent = 'カタカナのみ入力してください';
    return;
  }
  if (val.length < word.len) {
    inp.style.borderColor = '#cc3333';
    const err = document.getElementById('input-error');
    if (err) err.textContent = '文字数が足りません';
    return;
  }
  inp.style.borderColor = '';
  inp.title = '';
  const err = document.getElementById('input-error');
  if (err) err.textContent = '';
  for (let i = 0; i < word.len; i++) {
    const r = selectedDir === 'down' ? word.row + i : word.row;
    const c = selectedDir === 'across' ? word.col + i : word.col;
    if (!HINT_CELLS.has(r+','+c)) { userGrid[r][c] = val[i] || ''; checkedGrid[r][c] = null; }
  }
  renderGrid();
  // 上から落ちてくるエフェクト（時間差あり）
  for (let i = 0; i < word.len; i++) {
    const r = selectedDir === 'down' ? word.row + i : word.row;
    const c = selectedDir === 'across' ? word.col + i : word.col;
    if (HINT_CELLS.has(r+','+c)) continue;
    const el = getCellEl(r, c);
    el.classList.remove('drop-in');
    void el.offsetWidth;
    el.style.animationDelay = (i * 40) + 'ms';
    el.classList.add('drop-in');
  }
  saveProgress();
  closePanel();
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkComplete() {
  for (let r = 0; r < H; r++)
    for (let c = 0; c < W; c++)
      if (!grid[r][c].black && !userGrid[r][c]) { hideWrongMessage(); return; }
  for (let r = 0; r < H; r++) {
    for (let c = 0; c < W; c++) {
      if (grid[r][c].black) continue;
      const h = await sha256(userGrid[r][c]);
      if (h !== grid[r][c].answer) { showWrongMessage(); return; }
    }
  }
  hideWrongMessage();
  showComplete();
}

function showWrongMessage() {
  let el = document.getElementById('wrong-message');
  if (!el) {
    el = document.createElement('div');
    el.id = 'wrong-message';
    el.style.cssText = 'text-align:center; padding: 8px; font-size:14px; color:#aa2222; font-weight:600;';
    document.getElementById('main').appendChild(el);
  }
  el.textContent = '間違いがあります';
}

function hideWrongMessage() {
  const el = document.getElementById('wrong-message');
  if (el) el.textContent = '';
}

let _titleTapCount = 0;
let _titleTapTimer = null;
function onTitleClick() {
  _titleTapCount++;
  clearTimeout(_titleTapTimer);
  _titleTapTimer = setTimeout(() => { _titleTapCount = 0; }, 2000);
  if (_titleTapCount >= 5) {
    _titleTapCount = 0;
    if (confirm('保存データをすべてクリアしますか？\nこの操作は元に戻せません。')) {
      try { localStorage.removeItem('cw_user'); } catch(e) {}
      for (let r = 0; r < H; r++)
        for (let c = 0; c < W; c++) {
          if (!HINT_CELLS.has(r+','+c)) userGrid[r][c] = '';
          checkedGrid[r][c] = null;
        }
      renderGrid();
      alert('データをクリアしました。');
    }
  }
}

function saveProgress() {
  try { localStorage.setItem('cw_user', JSON.stringify(userGrid)); } catch(e) {}
}

function loadProgress() {
  try {
    const data = JSON.parse(localStorage.getItem('cw_user') || 'null');
    if (!data) return;
    for (let r = 0; r < H; r++)
      for (let c = 0; c < W; c++)
        if (data[r]?.[c] && !HINT_CELLS.has(r+','+c)) userGrid[r][c] = data[r][c];
  } catch(e) {}
}

function showComplete() {
  document.getElementById('complete-overlay').classList.add('show');
  startConfetti();
}

function startConfetti() {
  const canvas = document.getElementById('confetti');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    w: Math.random() * 8 + 4,
    h: Math.random() * 6 + 3,
    color: ['#9b59d0','#c490e8','#6dbb6d','#e890c8','#f0c060'][Math.floor(Math.random()*5)],
    vx: (Math.random()-0.5)*3, vy: Math.random()*3+2,
    angle: Math.random()*360, va: (Math.random()-0.5)*5,
  }));
  let frame = 0;
  function draw() {
    if (frame++ > 200) { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle * Math.PI / 180);
      ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.angle += p.va;
      if (p.y > canvas.height) { p.y = -20; p.x = Math.random() * canvas.width; }
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ヒントマス初期化
for (const key of HINT_CELLS) { const [r,c] = key.split(',').map(Number); userGrid[r][c] = HINT_MAP[key]; }

calcCellSize();
window.addEventListener('resize', () => { calcCellSize(); renderGrid(); });
buildGrid();
loadProgress();
renderGrid();
